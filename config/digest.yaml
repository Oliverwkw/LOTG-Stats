# Phase 14 weekly-digest delivery config.
#
# Recipients + non-secret sender settings. The sending account + password are
# NOT stored here in the clear — they are AES-256 encrypted into
# config/digest_credentials.enc, decrypted at send time with the DIGEST_KEY
# workflow secret (see scripts/send_digest.py). Re-encrypt with
# scripts/encrypt_digest_credentials.py (e.g. to swap in a Gmail App Password).
#
# Optional env overrides: SMTP_USERNAME / SMTP_PASSWORD (bypass the encrypted
# file), SMTP_HOST / SMTP_PORT (override the values below).
#
# The digest send is a no-op (logged, exit 0) whenever credentials are absent,
# so the pipeline is safe to run before DIGEST_KEY is added.

# From address is the decrypted sending account (lotgstats@gmail.com).
#
# `recipients`      — the real in-season Tuesday digest goes to the whole league.
# `test_recipients` — the "Send test digest email" button goes here only.
#
# ⚠️ THIS REPO IS PUBLIC, so the addresses below are published and scrapeable.
# To keep them out of the repo, set these repo *secrets* — each one overrides the
# matching list here (comma-separated), after which the YAML list can be emptied:
#
#   DIGEST_RECIPIENTS        -> overrides `recipients`
#   DIGEST_TEST_RECIPIENTS   -> overrides `test_recipients`
#   DIGEST_AUDIT_RECIPIENTS  -> overrides `audit_recipients`
#
# All three workflows already pass them through. Note that removing the
# addresses from this file does NOT erase them from git history.
recipients:
  - okeimweiss@gmail.com
  - skeimweiss@gmail.com
  - Benjamin.Rosenzweig@aol.com
  - jacob.rosenzweig@aol.com
  - plehv@outlook.com
  - lukejoshweber@gmail.com
  - steven.borodkin17@gmail.com
  - matthewtaub7@gmail.com

test_recipients:
  - okeimweiss@gmail.com

# `audit_recipients` — the SECOND weekly email: a private dataset-health check
# (breakages + missed injuries) to the maintainer only. See send_audit_email.py.
audit_recipients:
  - okeimweiss@gmail.com

from_name: "LOTG Stats"

# Defaults suit a Gmail sending account with an app password + 2FA. Override via
# SMTP_HOST / SMTP_PORT env if you send through another provider.
smtp_host: smtp.gmail.com
smtp_port: 587
