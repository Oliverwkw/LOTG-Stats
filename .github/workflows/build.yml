name: Build LOTG Stats

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (including LOTG package)
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m pip install --upgrade pip setuptools wheel 2>&1 | tee exports/raw/pip_install.log
          pip cache purge 2>&1 | tee -a exports/raw/pip_install.log || true
          pip install --no-cache-dir -r requirements.txt 2>&1 | tee -a exports/raw/pip_install.log
          pip install --no-cache-dir --no-build-isolation -e . 2>&1 | tee -a exports/raw/pip_install.log

      - name: Run LOTG build
        env:
          PYTHONPATH: src
          # GITHUB_TOKEN raises the GitHub API rate limit from 60/hour
          # (unauthenticated) to 5000/hour. lotg_support/ktc.py hits
          # the commits API once per unique trade date when fetching
          # historical DynastyProcess KTC snapshots — without auth the
          # build runs out of quota partway through and silently leaves
          # later trades as N/A.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m lotg 2>&1 | tee exports/raw/runner.log

      - name: Dump debug logs on failure
        if: failure()
        run: |
          echo "===== exports/raw/pip_install.log ====="
          test -f exports/raw/pip_install.log && tail -n 400 exports/raw/pip_install.log || true
          echo "===== exports/raw/runner.log ====="
          test -f exports/raw/runner.log && tail -n 400 exports/raw/runner.log || true
          echo "===== exports/raw/build_debug.log ====="
          test -f exports/raw/build_debug.log && tail -n 400 exports/raw/build_debug.log || true

      - name: Upload outputs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LOTG_outputs
          path: |
            exports/LOTG_Stats.xlsx
            exports/LOTG_Exports.zip
            exports/*.csv
            exports/raw/*
