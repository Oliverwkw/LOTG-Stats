name: Build LOTG Stats

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (including LOTG package)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install --no-build-isolation -e .

      - name: Run LOTG build
        env:
          PYTHONPATH: src
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m lotg 2>&1 | tee exports/raw/runner.log

      - name: Dump debug logs on failure
        if: failure()
        run: |
          echo "===== exports/raw/runner.log ====="
          test -f exports/raw/runner.log && tail -n 400 exports/raw/runner.log || true
          echo "===== exports/raw/build_debug.log ====="
          test -f exports/raw/build_debug.log && tail -n 400 exports/raw/build_debug.log || true

      - name: Upload outputs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LOTG_outputs
          path: |
            exports/LOTG_Stats.xlsx
            exports/LOTG_Exports.zip
            exports/*.csv
            exports/raw/*
