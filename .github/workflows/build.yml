name: Build LOTG Stats

on:
  schedule:
    # Phase 14 owns the canonical weekly pipeline run. Two cadences:
    #   * Tuesday 14:00 UTC (~10:00 ET) — the weekly build + digest EMAIL. Also
    #     the weekly exports refresh (replaces the old 12:00 bootstrap).
    #   * Thursday 16:00 UTC (~12:00 ET) — a pregame refresh (fresh rosters /
    #     stats before TNF). Builds the digest preview but does NOT email and
    #     does NOT rotate the digest baseline snapshot.
    # The digest EMAIL + snapshot rotation are gated to the Tuesday cron only,
    # so consecutive emails diff cleanly week-to-week. build_digest self-gates
    # to in-season, so both crons are harmless in the offseason.
    - cron: "0 14 * * 2"
    - cron: "0 16 * * 4"
  workflow_dispatch:
    inputs:
      force_refresh_cache:
        description: "Ignore the accumulated Actions cache and rebuild from the committed .cache baseline + fresh downloads"
        type: boolean
        default: false
      send_email:
        description: "Send the weekly digest email (and rotate its snapshot) on this manual run"
        type: boolean
        default: false

# Needed for the "Refresh committed exports" step to push back to main.
permissions:
  contents: write

# Never let two builds race to commit exports/ back.
concurrency:
  group: build-lotg-exports
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore NFLverse / DynastyProcess cache
        # .cache/ holds nflverse stats_player_week_{season}.csv,
        # nflverse_injuries_{season}.csv, nflverse player_ids, and the
        # DynastyProcess playerids + values files. Loaders in
        # lib/lotg_support/external.py already skip the download when
        # the file exists, so this restore turns the cost of those
        # ~10 fetches into zero once the cache is warm — and acts as
        # a fallback if NFLverse / DynastyProcess are ever unreachable.
        #
        # Keying: run_number makes every run save a fresh entry; the single
        # hash-scoped restore-key rolls the newest entry forward, but ONLY
        # while external.py is unchanged. Editing external.py (a URL/filename
        # fix) changes the hash, so no restore-key matches -> genuine cache
        # miss -> full re-download under the new key. There is deliberately
        # NO bare `nflverse-cache-` fallback: it matched across hashes and
        # silently resurrected the very files an external.py fix meant to
        # evict (the stale-cache trap behind the 401/403 audit-diff noise).
        # Manual escape hatch: run with force_refresh_cache=true to skip the
        # restore and rebuild from the committed .cache baseline.
        if: ${{ github.event.inputs.force_refresh_cache != 'true' }}
        uses: actions/cache/restore@v6
        with:
          path: .cache
          key: nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-${{ github.run_number }}
          restore-keys: |
            nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-

      - name: Restore KTC cache
        # data/ktc_cache/ holds dynasty-daddy's per-player history files
        # (~1k players, ~1800 daily rows each). Without this cache every
        # build re-fetches all of them, costing ~7-10 minutes. The
        # directory.json refresh logic inside lotg_support/ktc.py still
        # forces today's snapshot every 6 hours, so cache restore here
        # is safe even when KTC values change.
        #
        # Same keying rationale as the NFLverse cache above: changing ktc.py
        # busts cleanly (no bare `ktc-cache-` fallback that would resurrect
        # pre-change histories), and force_refresh_cache=true skips the
        # restore for a from-scratch rebuild.
        if: ${{ github.event.inputs.force_refresh_cache != 'true' }}
        uses: actions/cache/restore@v6
        with:
          path: data/ktc_cache
          key: ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-${{ github.run_number }}
          restore-keys: |
            ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-

      - name: Install dependencies (including LOTG package)
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m pip install --upgrade pip setuptools wheel 2>&1 | tee exports/raw/pip_install.log
          pip cache purge 2>&1 | tee -a exports/raw/pip_install.log || true
          pip install --no-cache-dir -r requirements.txt 2>&1 | tee -a exports/raw/pip_install.log
          pip install --no-cache-dir --no-build-isolation -e . 2>&1 | tee -a exports/raw/pip_install.log

      - name: Run LOTG build
        env:
          PYTHONPATH: src
          # GITHUB_TOKEN raises the GitHub API rate limit from 60/hour
          # (unauthenticated) to 5000/hour. lotg_support/ktc.py hits
          # the commits API once per unique trade date when fetching
          # historical DynastyProcess KTC snapshots — without auth the
          # build runs out of quota partway through and silently leaves
          # later trades as N/A.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m lotg 2>&1 | tee exports/raw/runner.log

      # Split save steps (paired with actions/cache/restore above): the restore
      # can be skipped via force_refresh_cache, but the freshly built caches are
      # always persisted for the next run. The per-run key never collides, and
      # always() saves even if the build failed so partial progress is kept —
      # matching the post-run save the old combined actions/cache did.
      - name: Save NFLverse / DynastyProcess cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .cache
          key: nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-${{ github.run_number }}

      - name: Save KTC cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: data/ktc_cache
          key: ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-${{ github.run_number }}

      - name: Run test suite against the build
        # Phase 12 #49: run the committed guards (cross-sheet reconciliation,
        # Formulas coverage, in-season freshness, data-quality sanity ranges)
        # against the freshly built exports on every build, so regressions from
        # code or upstream-data drift fail the run instead of slipping through.
        # continue-on-error keeps the artifact upload (below) running so the
        # outputs stay downloadable for a manual audit when a guard trips.
        continue-on-error: true
        env:
          PYTHONPATH: src:lib
          LOTG_EXPORTS: exports
        run: |
          set -o pipefail
          pip install --no-cache-dir pytest 2>&1 | tail -n 2
          python -m pytest tests/ -v 2>&1 | tee exports/raw/pytest.log

      - name: Injury-tracker coverage report
        # Phase 12 #41 / Phase 14: report how well the in-house Sleeper injury
        # tracker (data/injury_tracker.csv) covers the played weeks — capture
        # health, played-but-uncaptured week gaps, and a player_week cross-check.
        # Writes exports/raw/injury_coverage.md (committed with the build, so it's
        # downloadable). Never fails the build — it's a report. Empty in the
        # offseason (first capture is 2026 week 1).
        continue-on-error: true
        env:
          PYTHONPATH: src:lib
        run: |
          set -o pipefail
          python scripts/injury_coverage.py --exports exports 2>&1 | tee -a exports/raw/runner.log

      - name: Build weekly digest
        # Phase 14: render the digest from the freshly built exports. Self-gates
        # to in-season (skips + leaves the snapshot unrotated in the offseason).
        # Writes exports/raw/weekly_digest.html and updates the local snapshot;
        # the snapshot is only COMMITTED on the Tuesday send run (below), so the
        # week-over-week baseline rotates exactly once per week at email time.
        continue-on-error: true
        env:
          PYTHONPATH: src:lib
        run: |
          set -o pipefail
          python scripts/build_digest.py \
            --exports exports \
            --snapshot data/digest/ranks_snapshot.json \
            --out exports/raw/weekly_digest.html 2>&1 | tee exports/raw/digest.log

      - name: Commit refreshed exports on roster change (or weekly cadence)
        # The build above rewrote ALL of exports/ (the snapshot replay cache +
        # CSVs + xlsx/zip + raw dumps) from freshly-fetched live data, but CI
        # normally discards it — so the git-tracked exports/ drifts stale.
        #
        # Two triggers to commit the refreshed tree back:
        #   1. LIVE ROSTER/PICKS CHANGED — a trade or add must land immediately,
        #      not wait for the weekly cadence. This is the whole point: a
        #      same-week rebuild after a trade used to fetch the new roster but
        #      refuse to push it, so the committed roster stayed stale for days.
        #   2. WEEKLY CADENCE — the committed snapshot is >= 6 days old. Refreshes
        #      the replay cache / derived stats even when no roster move happened.
        # Routine derived-stat churn (< 6d old, no roster change) is left as-is so
        # every dispatch doesn't push noise.
        #
        # Staleness is read from #344's exports/snapshot/_snapshot_meta.json
        # captured_at, taken from the committed blob (git show HEAD:) — NOT from
        # git log (a shallow CI checkout can't date history). No committed stamp
        # yet (first run) => treated as stale. 6d (not 7) so the weekly cadence
        # trips reliably despite timing jitter. main only; [skip ci] and no push
        # trigger keep it loop-proof.
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: |
          set -euo pipefail
          committed_at="$(git show HEAD:exports/snapshot/_snapshot_meta.json 2>/dev/null \
            | python3 -c 'import sys,json; print(json.load(sys.stdin).get("captured_at",""))' 2>/dev/null || true)"
          if [ -n "${committed_at}" ]; then
            age_days="$(python3 -c "import datetime as d; c=d.datetime.fromisoformat('${committed_at}'); c=c if c.tzinfo else c.replace(tzinfo=d.timezone.utc); print(int((d.datetime.now(d.timezone.utc)-c).total_seconds()//86400))" 2>/dev/null || echo 999)"
          else
            age_days=999   # no committed capture stamp yet -> treat as stale
          fi

          git config user.name "lotg-exports-bot"
          git config user.email "noreply@anthropic.com"
          git add exports
          if git diff --cached --quiet; then
            echo "exports/ unchanged after rebuild; nothing to commit."
            exit 0
          fi

          # Did the live current-season roster or traded picks change?
          if git diff --cached --name-only \
               | grep -qE '^exports/(raw/(rosters|traded_picks)_[0-9]+\.json|snapshot/season_[0-9]+/(rosters|traded_picks)\.json)$'; then
            reason="live roster/picks changed"
          elif [ "${age_days}" -ge 6 ]; then
            reason="weekly cadence (${age_days}d stale)"
          else
            echo "Only non-roster churn and committed snapshot is ${age_days}d old (<6d); leaving exports/ as-is."
            git reset -q
            exit 0
          fi
          echo "Committing refreshed exports/ — ${reason}."
          git commit -m "Auto-refresh committed exports: ${reason} (run ${{ github.run_number }}) [skip ci]"
          git push

      - name: Rotate digest snapshot (Tuesday send run only)
        # Commit the rotated ranks snapshot ONLY on the send run, so next week's
        # email diffs against exactly one week ago. The Thursday pregame run
        # rebuilds the snapshot locally but never commits it, leaving the
        # baseline untouched. Separate from the exports commit above (which never
        # touches data/digest) — one clean weekly rotation. Also persists the
        # just-sent digest as data/digest/last_digest.html so the test-email
        # button always replays the most recent real digest.
        if: ${{ github.ref == 'refs/heads/main' && (github.event.schedule == '0 14 * * 2' || (github.event_name == 'workflow_dispatch' && github.event.inputs.send_email == 'true')) }}
        run: |
          set -euo pipefail
          if [ ! -f data/digest/ranks_snapshot.json ]; then
            echo "No digest snapshot (offseason / digest skipped); nothing to rotate."
            exit 0
          fi
          # Save the just-sent digest as the 'most recent' replay, but only when
          # it actually had content (an empty 'no changes' digest isn't sent).
          if [ -f exports/raw/weekly_digest.html ] && ! grep -q "No leaderboard changes this week." exports/raw/weekly_digest.html; then
            cp exports/raw/weekly_digest.html data/digest/last_digest.html
          fi
          git config user.name "lotg-digest-bot"
          git config user.email "noreply@anthropic.com"
          git add data/digest/ranks_snapshot.json data/digest/last_digest.html
          if git diff --cached --quiet; then
            echo "Digest snapshot unchanged; nothing to commit."
          else
            git commit -m "Weekly digest snapshot rotation (run ${{ github.run_number }}) [skip ci]"
            git push
          fi

      - name: Send weekly digest email (Tuesday send run only)
        # Mails exports/raw/weekly_digest.html to config/digest.yaml recipients.
        # Credentials are AES-encrypted in config/digest_credentials.enc and
        # decrypted at send time with the DIGEST_KEY secret. No-ops (logged,
        # non-failing) when the digest was skipped (offseason), has no changes
        # (--skip-empty), or DIGEST_KEY is absent — so this is safe before the
        # secret is added. (SMTP_USERNAME/SMTP_PASSWORD still override if set.)
        if: ${{ github.ref == 'refs/heads/main' && (github.event.schedule == '0 14 * * 2' || (github.event_name == 'workflow_dispatch' && github.event.inputs.send_email == 'true')) }}
        env:
          DIGEST_KEY: ${{ secrets.DIGEST_KEY }}
        run: python scripts/send_digest.py --skip-empty

      - name: Dump debug logs on failure
        if: failure()
        run: |
          echo "===== exports/raw/pip_install.log ====="
          test -f exports/raw/pip_install.log && tail -n 400 exports/raw/pip_install.log || true
          echo "===== exports/raw/runner.log ====="
          test -f exports/raw/runner.log && tail -n 400 exports/raw/runner.log || true
          echo "===== exports/raw/build_debug.log ====="
          test -f exports/raw/build_debug.log && tail -n 400 exports/raw/build_debug.log || true

      - name: Upload outputs and logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: LOTG_outputs
          path: |
            exports/LOTG_Stats.xlsx
            exports/LOTG_Exports.zip
            exports/*.csv
            exports/raw/*
