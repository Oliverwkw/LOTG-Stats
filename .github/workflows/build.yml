name: Build LOTG Stats

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (including LOTG package)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run LOTG build
        env:
          PYTHONPATH: src
        run: |
          python -m lotg

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: LOTG_outputs
          path: |
            exports/LOTG_Stats.xlsx
            exports/LOTG_Exports.zip
            exports/*.csv
            exports/raw/*
