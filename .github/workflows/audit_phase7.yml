name: Phase 7 Audit

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/phase-7-audit-**"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # full history so the worktree can check out the pre-Phase-7 baseline commit
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore NFLverse / DynastyProcess cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-${{ github.run_number }}
          restore-keys: |
            nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-
            nflverse-cache-

      - name: Restore KTC cache
        uses: actions/cache@v4
        with:
          path: data/ktc_cache
          key: ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-${{ github.run_number }}
          restore-keys: |
            ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-
            ktc-cache-

      - name: Install dependencies (including LOTG package)
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir --no-build-isolation -e .

      - name: Run LOTG build
        env:
          PYTHONPATH: src
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m lotg 2>&1 | tee exports/raw/runner.log

      - name: Build pre-Phase-7 baseline at the SAME data snapshot (worktree)
        # Rebuild the last pre-Phase-7 commit (c3a17b6, #189) in a detached
        # worktree, sharing the SAME warm .cache / ktc_cache so KTC daily
        # snapshots and nflverse data are byte-identical to the current build.
        # This isolates the diff to CODE changes (Phase 7) and removes the
        # live-data drift that contaminates a cross-date artifact comparison.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          BASE="$RUNNER_TEMP/base"
          git worktree add --detach "$BASE" c3a17b6
          ln -s "$GITHUB_WORKSPACE/.cache" "$BASE/.cache"
          mkdir -p "$BASE/data"
          ln -s "$GITHUB_WORKSPACE/data/ktc_cache" "$BASE/data/ktc_cache"
          python -m venv "$RUNNER_TEMP/vbase"
          "$RUNNER_TEMP/vbase/bin/pip" install --upgrade pip setuptools wheel
          "$RUNNER_TEMP/vbase/bin/pip" install --no-cache-dir -r "$BASE/requirements.txt"
          "$RUNNER_TEMP/vbase/bin/pip" install --no-cache-dir --no-build-isolation -e "$BASE"
          ( cd "$BASE" && PYTHONPATH=src "$RUNNER_TEMP/vbase/bin/python" -m lotg 2>&1 \
              | tee "$GITHUB_WORKSPACE/exports/raw/baseline_build.log" )
          echo "baseline exports:"; ls "$BASE/exports" || true

      - name: Run Phase 7 audit
        env:
          EXPORTS_DIR: exports
          BASELINE_DIR: ${{ runner.temp }}/base/exports
          CATALOG: plan/stats_catalog.json
        run: |
          set -o pipefail
          python plan/audit_phase7.py 2>&1 | tee exports/raw/audit_phase7.log

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7_audit
          path: |
            exports/raw/audit_phase7.log
            exports/raw/runner.log
