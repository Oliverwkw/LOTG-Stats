name: Phase 7 Audit

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/phase-7-audit-**"

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore NFLverse / DynastyProcess cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-${{ github.run_number }}
          restore-keys: |
            nflverse-cache-${{ hashFiles('lib/lotg_support/external.py') }}-
            nflverse-cache-

      - name: Restore KTC cache
        uses: actions/cache@v4
        with:
          path: data/ktc_cache
          key: ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-${{ github.run_number }}
          restore-keys: |
            ktc-cache-${{ hashFiles('lib/lotg_support/ktc.py') }}-
            ktc-cache-

      - name: Install dependencies (including LOTG package)
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir --no-build-isolation -e .

      - name: Run LOTG build
        env:
          PYTHONPATH: src
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p exports/raw
          set -o pipefail
          python -m lotg 2>&1 | tee exports/raw/runner.log

      - name: Download pre-Phase-7 baseline artifact (run 277 / commit c3a17b6)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          # Baseline = pre-Phase-7 build (artifact id from run #277).
          curl -sSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/7321935583/zip" \
            -o baseline.zip
          mkdir -p baseline
          unzip -q baseline.zip -d baseline || { echo "baseline unzip failed"; ls -la; }
          echo "baseline contents:"; ls -R baseline | head -40

      - name: Run Phase 7 audit
        env:
          EXPORTS_DIR: exports
          BASELINE_DIR: baseline/exports
          CATALOG: plan/stats_catalog.json
        run: |
          set -o pipefail
          python plan/audit_phase7.py 2>&1 | tee exports/raw/audit_phase7.log

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7_audit
          path: |
            exports/raw/audit_phase7.log
            exports/raw/runner.log
